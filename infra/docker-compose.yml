services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: easysubway-postgres
    environment:
      POSTGRES_DB: ${EASYSUBWAY_POSTGRES_DB:-easysubway}
      POSTGRES_USER: ${EASYSUBWAY_POSTGRES_USER:-easysubway}
      POSTGRES_PASSWORD: ${EASYSUBWAY_POSTGRES_PASSWORD:-easysubway_local}
    ports:
      - "${EASYSUBWAY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  object-storage:
    image: minio/minio:RELEASE.2026-06-13T11-33-47Z
    container_name: easysubway-object-storage
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${EASYSUBWAY_OBJECT_STORAGE_ACCESS_KEY:-easysubway_local}
      MINIO_ROOT_PASSWORD: ${EASYSUBWAY_OBJECT_STORAGE_SECRET_KEY:-easysubway_local_secret}
    ports:
      - "${EASYSUBWAY_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${EASYSUBWAY_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      labels:
        org.opencontainers.image.revision: ${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
        org.opencontainers.image.source: https://github.com/AquilaXk/easysubway
        com.easysubway.jar.sha256: ${EASYSUBWAY_BACKEND_JAR_SHA256:-unknown}
    image: easysubway-backend:${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
    container_name: easysubway-backend
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ${EASYSUBWAY_BACKEND_ENV_FILE:-../.env.example}
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${EASYSUBWAY_BACKEND_BIND:-127.0.0.1}:${EASYSUBWAY_BACKEND_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.4
    container_name: easysubway-prometheus
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${EASYSUBWAY_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  loki:
    image: grafana/loki:3.6.0
    container_name: easysubway-loki
    profiles:
      - observability
    command:
      - "--config.file=/etc/loki/loki.yml"
    ports:
      - "127.0.0.1:${EASYSUBWAY_LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "loki", "-config.file=/etc/loki/loki.yml", "-verify-config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:12.2.9
    container_name: easysubway-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${EASYSUBWAY_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${EASYSUBWAY_GRAFANA_ADMIN_PASSWORD:-easysubway_local}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${EASYSUBWAY_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  object-storage-data:
  prometheus-data:
  loki-data:
  grafana-data:
