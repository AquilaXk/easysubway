services:
  postgres:
    image: imresamu/postgis:16-3.5@sha256:92031b614897082103c00729ea26e62f118ecb59b71e27b5c3ac3a8dc13bff23
    container_name: easysubway-postgres
    environment:
      POSTGRES_DB: ${EASYSUBWAY_POSTGRES_DB:-easysubway}
      POSTGRES_USER: ${EASYSUBWAY_POSTGRES_USER:-easysubway}
      POSTGRES_PASSWORD: ${EASYSUBWAY_POSTGRES_PASSWORD:-easysubway_local}
    ports:
      - "${EASYSUBWAY_POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  object-storage:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: easysubway-object-storage
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${EASYSUBWAY_OBJECT_STORAGE_ACCESS_KEY:-easysubway_local}
      MINIO_ROOT_PASSWORD: ${EASYSUBWAY_OBJECT_STORAGE_SECRET_KEY:-easysubway_local_secret}
    ports:
      - "${EASYSUBWAY_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${EASYSUBWAY_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      labels:
        org.opencontainers.image.revision: ${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
        org.opencontainers.image.source: https://github.com/AquilaXk/easysubway
        com.easysubway.jar.sha256: ${EASYSUBWAY_BACKEND_JAR_SHA256:-unknown}
    image: easysubway-backend:${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
    container_name: easysubway-backend
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ${EASYSUBWAY_BACKEND_ENV_FILE:-../.env.example}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EASYSUBWAY_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${EASYSUBWAY_POSTGRES_DB:-easysubway}
      EASYSUBWAY_REPORT_OBJECT_STORAGE_INTERNAL_ENDPOINT: http://object-storage:9000
      EASYSUBWAY_PUSH_DELIVERY_ENABLED: "false"
    ports:
      - "${EASYSUBWAY_BACKEND_BIND:-127.0.0.1}:${EASYSUBWAY_BACKEND_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  back-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      labels:
        org.opencontainers.image.revision: ${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
        org.opencontainers.image.source: https://github.com/AquilaXk/easysubway
        com.easysubway.jar.sha256: ${EASYSUBWAY_BACKEND_JAR_SHA256:-unknown}
    image: easysubway-backend:${EASYSUBWAY_BACKEND_IMAGE_TAG:-local}
    container_name: easysubway-back-worker
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ${EASYSUBWAY_BACKEND_ENV_FILE:-../.env.example}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EASYSUBWAY_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${EASYSUBWAY_POSTGRES_DB:-easysubway}
      EASYSUBWAY_REPORT_OBJECT_STORAGE_INTERNAL_ENDPOINT: http://object-storage:9000
      EASYSUBWAY_PUSH_DELIVERY_ENABLED: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  public-edge-probe:
    image: prom/blackbox-exporter:v0.27.0
    container_name: easysubway-public-edge-probe
    profiles:
      - observability

  docker-runtime-probe:
    image: ghcr.io/google/cadvisor:v0.60.3
    container_name: easysubway-docker-runtime-probe
    profiles:
      - observability
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  alertmanager:
    image: prom/alertmanager:v0.33.0
    container_name: easysubway-alertmanager
    profiles:
      - observability
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=${EASYSUBWAY_ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}"
      - "--web.route-prefix=/"
    ports:
      - "${EASYSUBWAY_ALERTMANAGER_BIND:-127.0.0.1}:${EASYSUBWAY_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ${EASYSUBWAY_ALERTMANAGER_CONFIG_FILE:-./alertmanager/alertmanager.local.yml}:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.5.4
    container_name: easysubway-prometheus
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.external-url=${EASYSUBWAY_PROMETHEUS_EXTERNAL_URL:-http://localhost:9090}"
    ports:
      - "${EASYSUBWAY_PROMETHEUS_BIND:-127.0.0.1}:${EASYSUBWAY_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  loki-volume-init:
    image: busybox:1.37.0
    container_name: easysubway-loki-volume-init
    profiles:
      - observability
    command: ["sh", "-c", "mkdir -p /loki/chunks /loki/rules /loki/rules-temp /loki/retention && chown -R 10001:10001 /loki"]
    volumes:
      - loki-data:/loki

  loki:
    image: grafana/loki:3.6.0
    container_name: easysubway-loki
    profiles:
      - observability
    user: "10001:10001"
    command:
      - "--config.file=/etc/loki/loki.yml"
    ports:
      - "127.0.0.1:${EASYSUBWAY_LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    depends_on:
      loki-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "loki", "-config.file=/etc/loki/loki.yml", "-verify-config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:12.2.9
    container_name: easysubway-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${EASYSUBWAY_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${EASYSUBWAY_GRAFANA_ADMIN_PASSWORD:-easysubway_local}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${EASYSUBWAY_GRAFANA_BIND:-127.0.0.1}:${EASYSUBWAY_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  object-storage-data:
  alertmanager-data:
  prometheus-data:
  loki-data:
  grafana-data:
