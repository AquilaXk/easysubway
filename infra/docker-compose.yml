services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: easysubway-postgres
    environment:
      POSTGRES_DB: ${EASYSUBWAY_POSTGRES_DB:-easysubway}
      POSTGRES_USER: ${EASYSUBWAY_POSTGRES_USER:-easysubway}
      POSTGRES_PASSWORD: ${EASYSUBWAY_POSTGRES_PASSWORD:-easysubway_local}
    ports:
      - "${EASYSUBWAY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: easysubway-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${EASYSUBWAY_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
