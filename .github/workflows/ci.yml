name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest

    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ios: ${{ steps.filter.outputs.ios }}
      repository: ${{ steps.filter.outputs.repository }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ci: ${{ steps.filter.outputs.ci }}
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Changes / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Changes / Detect changed paths and CI areas
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${zero_sha}" ]]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt
          bash tools/ci/detect-changed-paths.sh changed-files.txt

  dependency-vulnerability-scan:
    name: Dependency Vulnerability Scan
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.docs_only != 'true' }}
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2
    with:
      scan-args: |-
        --lockfile=apps/mobile/pubspec.lock
        --lockfile=apps/mobile/android/app/gradle.lockfile
        --lockfile=backend/gradle.lockfile

  release-gate-consistency:
    name: Release Gate Consistency
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Release Gate Consistency / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Release Gate Consistency / Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Release Gate Consistency / Run release gate contract tests
        env:
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
        run: node --test tools/ci/repository-contract.test.mjs

  repository-contracts:
    name: Repository CI
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Repository CI / Skip unchanged area
        if: ${{ needs.changes.outputs.repository != 'true' && needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.ci != 'true' }}
        run: echo "No repository, docs-only, or CI changes; skipping repository checks."

      - name: Repository CI / Checkout repository
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Repository CI / Set up Node.js
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Repository CI / Validate whitespace
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root HEAD
          fi

      - name: Repository CI / Run contract tests
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        env:
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
        run: node --test tools/ci/*.test.mjs

      - name: Repository CI / Run data pack tool tests
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.ci == 'true' }}
        env:
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
        run: node --test tools/datapack/*.test.mjs

      - name: Repository CI / Set up Chrome for route map tests
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.ci == 'true' }}
        id: setup-chrome
        uses: browser-actions/setup-chrome@086160e580d6e8c142ad5ba29009dcde677c6321
        with:
          install-dependencies: true

      - name: Repository CI / Run route map tool tests
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.ci == 'true' }}
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
          ROUTE_MAP_CHROME_NO_SANDBOX: "1"
        run: node --test tools/route-map/*.test.mjs

      - name: Repository CI / Run realtime provider contract tests
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.ci == 'true' }}
        env:
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
        run: node --test tools/realtime/*.test.mjs

      - name: Repository CI / Validate Docker Compose config
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        run: docker compose --env-file .env.example -f infra/docker-compose.yml config --quiet

      - name: Repository CI / Validate issue forms
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        run: ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts f }' .github/ISSUE_TEMPLATE/*.yml

      - name: Repository CI / Validate tracked Markdown policy
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          unexpected_markdown="$(git ls-files '*.md' ':!:README.md' ':!:.github/pull_request_template.md')"
          if [[ -n "${unexpected_markdown}" ]]; then
            echo "Unexpected tracked Markdown file:"
            echo "${unexpected_markdown}"
            exit 1
          fi

      - name: Repository CI / Validate local agent docs are not tracked
        if: ${{ needs.changes.outputs.repository == 'true' || needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          unexpected_agent_files="$(git ls-files AGENTS.md CLAUDE.md GEMINI.md CURSOR.md COPILOT.md docs .codex .claude .cursor .aider .windsurf .ai)"
          if [[ -n "${unexpected_agent_files}" ]]; then
            echo "Unexpected tracked local agent file:"
            echo "${unexpected_agent_files}"
            exit 1
          fi

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Backend CI / Skip unchanged area
        if: ${{ needs.changes.outputs.backend != 'true' }}
        run: echo "No backend changes; skipping backend checks."

      - name: Backend CI / Checkout repository
        if: ${{ needs.changes.outputs.backend == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Backend CI / Detect backend scaffold
        if: ${{ needs.changes.outputs.backend == 'true' }}
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f backend/gradlew ]]; then
            chmod +x backend/gradlew
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Backend scaffold not found; skipping backend checks."
          fi

      - name: Backend CI / Set up Java
        if: ${{ needs.changes.outputs.backend == 'true' && steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Backend CI / Run Gradle checks
        if: ${{ needs.changes.outputs.backend == 'true' && steps.scaffold.outputs.present == 'true' }}
        working-directory: backend
        run: ./gradlew check --no-daemon

  mobile-app:
    name: Mobile App CI
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Mobile App CI / Skip unchanged area
        if: ${{ needs.changes.outputs.mobile != 'true' }}
        run: echo "No mobile app changes; skipping mobile checks."

      - name: Mobile App CI / Checkout repository
        if: ${{ needs.changes.outputs.mobile == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Mobile App CI / Detect Flutter scaffold
        if: ${{ needs.changes.outputs.mobile == 'true' }}
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f apps/mobile/pubspec.yaml ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Flutter mobile scaffold not found; skipping mobile checks."
          fi

      - name: Mobile App CI / Set up Flutter
        if: ${{ needs.changes.outputs.mobile == 'true' && steps.scaffold.outputs.present == 'true' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Mobile App CI / Set up Node.js for mobile contracts
        if: ${{ needs.changes.outputs.mobile == 'true' && steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Mobile App CI / Generate Android release merged manifest
        if: ${{ needs.changes.outputs.mobile == 'true' && steps.scaffold.outputs.present == 'true' }}
        working-directory: apps/mobile
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ci-release-manifest-only.jks
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ci-release-manifest-only
          EASYSUBWAY_ANDROID_KEY_ALIAS: ci-release-manifest-only
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ci-release-manifest-only
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --config-only
          android/gradlew -p android :app:processReleaseMainManifest --no-daemon

      - name: Mobile App CI / Run mobile contracts
        if: ${{ needs.changes.outputs.mobile == 'true' && steps.scaffold.outputs.present == 'true' }}
        env:
          EASYSUBWAY_EXPECT_ANDROID_RELEASE_MANIFEST: "true"
        run: node --test --test-name-pattern "모바일 generic catch|모바일 접근성 출시 QA|릴리즈 보안 기준선|모바일 스토어 심사 정보 기준선|모바일 스토어 개인정보 인벤토리|Android 릴리즈 권한|iOS 앱은 개인정보 매니페스트|Android 런처 아이콘" tools/ci/repository-contract.test.mjs

      - name: Mobile App CI / Run Flutter analyzer and tests
        if: ${{ needs.changes.outputs.mobile == 'true' && steps.scaffold.outputs.present == 'true' }}
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter analyze
          flutter test

  android:
    name: Android CI
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Android CI / Skip unchanged area
        if: ${{ needs.changes.outputs.android != 'true' }}
        run: echo "No Android changes; skipping Android checks."

      - name: Android CI / Checkout repository
        if: ${{ needs.changes.outputs.android == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Android CI / Detect Android scaffold
        if: ${{ needs.changes.outputs.android == 'true' }}
        id: scaffold
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f apps/mobile/pubspec.yaml && -d apps/mobile/android ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "Android scaffold not found; skipping Android checks."
          fi

      - name: Android CI / Set up Java
        if: ${{ needs.changes.outputs.android == 'true' && steps.scaffold.outputs.present == 'true' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Android CI / Set up Flutter
        if: ${{ needs.changes.outputs.android == 'true' && steps.scaffold.outputs.present == 'true' }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Android CI / Build Flutter Android debug APK
        if: ${{ needs.changes.outputs.android == 'true' && steps.scaffold.outputs.present == 'true' }}
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --debug

  notify-slack-ci-failure:
    name: Slack / CI failure
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - changes
      - release-gate-consistency
      - repository-contracts
      - backend
      - mobile-app
      - android
      - dependency-vulnerability-scan
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
      }}
    env:
      SLACK_CI_WEBHOOK_URL: ${{ secrets.SLACK_CI_WEBHOOK_URL }}
    steps:
      - name: Slack / Skip missing CI webhook
        if: ${{ env.SLACK_CI_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_CI_WEBHOOK_URL is not configured."

      - name: Slack / Notify CI failure
        if: ${{ env.SLACK_CI_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_CI_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway CI failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway CI 실패*
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.ref_name }}`
                    • actor: `${{ github.actor }}`
                    • run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions 열기>
