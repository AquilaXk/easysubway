name: Slack Notifications

on:
  workflow_run:
    workflows:
      - CI
      - CD
      - Data Pack Release
      - Release Artifacts
      - SonarCloud
      - Store Distribution Evidence
    types:
      - completed

concurrency:
  group: slack-notifications-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  notify-ci-failure:
    name: Slack / CI failure
    if: ${{ contains(fromJSON('["failure","cancelled","timed_out"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.name == 'CI' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_CI_WEBHOOK_URL: ${{ secrets.SLACK_CI_WEBHOOK_URL }}

    steps:
      - name: Slack / Skip missing CI webhook
        if: ${{ env.SLACK_CI_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_CI_WEBHOOK_URL is not configured."

      - name: Slack / Notify CI failure
        if: ${{ env.SLACK_CI_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_CI_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway CI ${{ github.event.workflow_run.conclusion }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway CI ${{ github.event.workflow_run.conclusion }}*
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.event.workflow_run.head_branch }}`
                    • actor: `${{ github.event.workflow_run.actor.login }}`
                    • run: <${{ github.event.workflow_run.html_url }}|GitHub Actions 열기>

  notify-release:
    name: Slack / Release workflow result
    if: ${{ contains(fromJSON('["CD","Data Pack Release","Release Artifacts","Store Distribution Evidence"]'), github.event.workflow_run.name) && contains(fromJSON('["success","failure","cancelled","timed_out"]'), github.event.workflow_run.conclusion) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}

    steps:
      - name: Slack / Skip missing release webhook
        if: ${{ env.SLACK_RELEASE_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_RELEASE_WEBHOOK_URL is not configured."

      - name: Slack / Notify release workflow result
        if: ${{ env.SLACK_RELEASE_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway release workflow ${{ github.event.workflow_run.conclusion }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway 릴리즈 workflow ${{ github.event.workflow_run.conclusion }}*
                    • workflow: `${{ github.event.workflow_run.name }}`
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.event.workflow_run.head_branch }}`
                    • actor: `${{ github.event.workflow_run.actor.login }}`
                    • run: <${{ github.event.workflow_run.html_url }}|GitHub Actions 열기>

  notify-security-failure:
    name: Slack / Security failure
    if: ${{ contains(fromJSON('["failure","cancelled","timed_out"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.name == 'SonarCloud' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_SECURITY_WEBHOOK_URL: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}

    steps:
      - name: Slack / Skip missing security webhook
        if: ${{ env.SLACK_SECURITY_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_SECURITY_WEBHOOK_URL is not configured."

      - name: Slack / Notify security failure
        if: ${{ env.SLACK_SECURITY_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_SECURITY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway security workflow ${{ github.event.workflow_run.conclusion }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway 보안 workflow ${{ github.event.workflow_run.conclusion }}*
                    • workflow: `${{ github.event.workflow_run.name }}`
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.event.workflow_run.head_branch }}`
                    • actor: `${{ github.event.workflow_run.actor.login }}`
                    • run: <${{ github.event.workflow_run.html_url }}|GitHub Actions 열기>
