name: SonarCloud

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "backend/**"
      - "apps/mobile/**"
      - "tools/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "apps/mobile/**"
      - "tools/**"
      - "sonar-project.properties"
      - ".github/workflows/sonarcloud.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  automatic-analysis:
    name: SonarCloud CI scanner disabled
    if: vars.SONARCLOUD_CI_ENABLED != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Explain SonarCloud analysis method
        run: |
          echo "SonarCloud CI scanner is disabled because SONARCLOUD_CI_ENABLED is not true."
          echo "SonarQube Cloud Automatic Analysis is expected to provide the actual code-analysis check."
          echo "Do not enable the CI scanner unless Automatic Analysis is disabled in SonarQube Cloud."

  sonarcloud:
    if: vars.SONARCLOUD_CI_ENABLED == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build backend classes
        working-directory: backend
        run: ./gradlew check --no-daemon

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  notify-slack-security-failure:
    name: Slack / Security failure
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - automatic-analysis
      - sonarcloud
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
      }}
    env:
      SLACK_SECURITY_WEBHOOK_URL: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
    steps:
      - name: Slack / Skip missing security webhook
        if: ${{ env.SLACK_SECURITY_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_SECURITY_WEBHOOK_URL is not configured."

      - name: Slack / Notify security failure
        if: ${{ env.SLACK_SECURITY_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_SECURITY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway security workflow failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway 보안 workflow 실패*
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.ref_name }}`
                    • actor: `${{ github.actor }}`
                    • run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions 열기>
