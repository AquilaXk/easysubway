name: Release Artifacts

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest

    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ios: ${{ steps.filter.outputs.ios }}
      repository: ${{ steps.filter.outputs.repository }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ci: ${{ steps.filter.outputs.ci }}
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Changes / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Changes / Detect changed paths and artifact areas
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${zero_sha}" ]]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt
          bash tools/ci/detect-changed-paths.sh changed-files.txt

  android-release:
    name: Android Release Artifact
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.mobile == 'true' }}

    steps:
      - name: Android Release Artifact / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Android Release Artifact / Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Android Release Artifact / Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Android Release Artifact / Create CI release keystore
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easysubway-ci-release.jks
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ci-release-password
          EASYSUBWAY_ANDROID_KEY_ALIAS: ci-release
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ci-release-password
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "${EASYSUBWAY_ANDROID_KEYSTORE_PATH}" \
            -storepass "${EASYSUBWAY_ANDROID_STORE_PASSWORD}" \
            -keypass "${EASYSUBWAY_ANDROID_KEY_PASSWORD}" \
            -alias "${EASYSUBWAY_ANDROID_KEY_ALIAS}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=EasySubway CI,O=EasySubway,C=KR"

      - name: Android Release Artifacts / Restore GitHub Actions dotenv secret
        shell: bash
        env:
          EASYSUBWAY_ENV_SECRET: ${{ secrets.EASYSUBWAY_ENV }}
        run: |
          set -euo pipefail
          mark_pr_non_store_ready() {
            echo "::notice title=Release artifact env::Store privacy release values are unavailable; skipping store-ready artifact build for this PR."
            {
              echo "EASYSUBWAY_RELEASE_ARTIFACTS_STORE_READY=false"
              echo "EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD=true"
            } >> "${GITHUB_ENV}"
          }

          if [[ -z "${EASYSUBWAY_ENV_SECRET}" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              mark_pr_non_store_ready
              exit 0
            fi
            printf 'EASYSUBWAY_ENV secret is required for store privacy release artifact builds.\n' >&2
            exit 1
          fi
          env_file="${RUNNER_TEMP}/easysubway-release.env"
          printf '%s' "${EASYSUBWAY_ENV_SECRET}" > "${env_file}"
          if node tools/ci/validate-store-privacy-env.mjs --env-file "${env_file}" --github-env "${GITHUB_ENV}"; then
            echo "EASYSUBWAY_RELEASE_ARTIFACTS_STORE_READY=true" >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            mark_pr_non_store_ready
          else
            exit 1
          fi

      - name: Android Release Artifact / Record non-store-ready PR gate
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD == 'true' }}
        shell: bash
        run: |
          {
            echo "store_ready=false"
            echo "artifact=skipped"
            echo "reason=EASYSUBWAY_ENV missing required store privacy release values for PR context"
            echo "toolchain_policy=apps/mobile/release/signed-release-artifact-gate.json"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Android Release Artifact / Build Flutter app bundle
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        working-directory: apps/mobile
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easysubway-ci-release.jks
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ci-release-password
          EASYSUBWAY_ANDROID_KEY_ALIAS: ci-release
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ci-release-password
        run: |
          set -euo pipefail
          flutter pub get
          flutter build appbundle --release \
            --dart-define=EASYSUBWAY_PRIVACY_POLICY_URL="${EASYSUBWAY_PRIVACY_POLICY_URL}" \
            --dart-define=EASYSUBWAY_SUPPORT_EMAIL="${EASYSUBWAY_SUPPORT_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_DELETION_EMAIL="${EASYSUBWAY_DATA_DELETION_EMAIL}" \
            --dart-define=EASYSUBWAY_SECURITY_EMAIL="${EASYSUBWAY_SECURITY_EMAIL}" \
            --dart-define=EASYSUBWAY_ENABLE_PUSH_NOTIFICATIONS=false

      - name: Android Release Artifact / Collect release outputs
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/android/app-release.aab
          cp release/signed-release-artifact-gate.json release-artifacts/android/signed-release-artifact-gate.json
          cp release/android-16kb-page-size-gate.json release-artifacts/android/android-16kb-page-size-gate.json
          cp ../../tools/mobile/check-android-aab-16kb-page-size.sh release-artifacts/android/check-android-aab-16kb-page-size.sh
          cp ../../tools/mobile/check-elf-load-alignment.mjs release-artifacts/android/check-elf-load-alignment.mjs
          if [[ -f build/app/outputs/mapping/release/mapping.txt ]]; then
            cp build/app/outputs/mapping/release/mapping.txt release-artifacts/android/mapping.txt
          else
            printf 'mapping=not-generated\n' > release-artifacts/android/mapping.txt
          fi
          {
            echo "commit=${GITHUB_SHA}"
            echo "artifact=app-release.aab"
            echo "store_ready=false"
            echo "signing_key_type=temporary-self-signed"
            echo "mapping=build/app/outputs/mapping/release/mapping.txt"
            echo "mapping_retention_days=90"
            echo "play_submission_evidence=blocked_missing_internal_track_or_prelaunch_report"
            echo "page_size_16kb_evidence=blocked_until_tools_mobile_check_android_aab_16kb_page_size_passes_and_runtime_PAGE_SIZE_16384_smoke_passes"
            echo "toolchain_policy=apps/mobile/release/signed-release-artifact-gate.json"
          } > release-artifacts/android/release-metadata.txt

      - name: Android Release Artifact / Upload app bundle
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-android-release-${{ github.sha }}
          path: apps/mobile/release-artifacts/android
          if-no-files-found: error
          retention-days: 90

  backend-release:
    name: Backend Release Image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy == 'true' }}

    steps:
      - name: Backend Release Image / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Backend Release Image / Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Backend Release Image / Build bootJar
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Backend Release Image / Build and inspect image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f backend/Dockerfile -t easysubway-backend:${{ github.sha }} backend
          docker image inspect easysubway-backend:${{ github.sha }}

      - name: Backend Release Image / Validate deployment dry-run
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.example -f infra/docker-compose.yml config --quiet

      - name: Backend Release Image / Collect release metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/backend
          docker image inspect easysubway-backend:${{ github.sha }} > release-artifacts/backend/image-inspect.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "image=easysubway-backend:${GITHUB_SHA}"
            echo "dockerfile=backend/Dockerfile"
            echo "compose=infra/docker-compose.yml"
          } > release-artifacts/backend/release-metadata.txt

      - name: Backend Release Image / Upload image metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-backend-release-${{ github.sha }}
          path: release-artifacts/backend
          if-no-files-found: error
          retention-days: 14
