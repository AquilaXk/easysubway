name: Release Artifacts

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      android_rc_signing_mode:
        description: Android RC signing mode
        type: choice
        required: true
        default: ci-self-signed
        options:
          - ci-self-signed
          - production-upload-key

concurrency:
  group: release-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      android: ${{ steps.filter.outputs.android }}
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ios: ${{ steps.filter.outputs.ios }}
      repository: ${{ steps.filter.outputs.repository }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      ci: ${{ steps.filter.outputs.ci }}
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Changes / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Changes / Detect changed paths and artifact areas
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "${zero_sha}" ]]; then
            base_sha="${BEFORE_SHA}"
          else
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt
          bash tools/ci/detect-changed-paths.sh changed-files.txt

  android-release:
    name: Android Release Artifact
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
    if: ${{ needs.changes.outputs.android == 'true' || needs.changes.outputs.mobile == 'true' }}

    steps:
      - name: Android Release Artifact / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Android Release Artifact / Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Android Release Artifact / Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Android Release Artifact / Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Android Release Artifact / Create CI release keystore
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easysubway-ci-release.jks
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ci-release-password
          EASYSUBWAY_ANDROID_KEY_ALIAS: ci-release
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ci-release-password
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "${EASYSUBWAY_ANDROID_KEYSTORE_PATH}" \
            -storepass "${EASYSUBWAY_ANDROID_STORE_PASSWORD}" \
            -keypass "${EASYSUBWAY_ANDROID_KEY_PASSWORD}" \
            -alias "${EASYSUBWAY_ANDROID_KEY_ALIAS}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=EasySubway CI,O=EasySubway,C=KR"

      - name: Android Release Artifacts / Restore GitHub Actions dotenv secret
        shell: bash
        env:
          EASYSUBWAY_ENV_SECRET: ${{ secrets.EASYSUBWAY_ENV }}
        run: |
          set -euo pipefail
          mark_pr_non_store_ready() {
            echo "::notice title=Release artifact env::Store privacy release values are unavailable; skipping store-ready artifact build for this PR."
            {
              echo "EASYSUBWAY_RELEASE_ARTIFACTS_STORE_READY=false"
              echo "EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD=true"
            } >> "${GITHUB_ENV}"
          }

          if [[ -z "${EASYSUBWAY_ENV_SECRET}" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              mark_pr_non_store_ready
              exit 0
            fi
            printf 'EASYSUBWAY_ENV secret is required for store privacy release artifact builds.\n' >&2
            exit 1
          fi
          env_file="${RUNNER_TEMP}/easysubway-release.env"
          printf '%s' "${EASYSUBWAY_ENV_SECRET}" > "${env_file}"
          if node tools/ci/validate-store-privacy-env.mjs --env-file "${env_file}" --github-env "${GITHUB_ENV}"; then
            echo "EASYSUBWAY_RELEASE_ARTIFACTS_STORE_READY=true" >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            mark_pr_non_store_ready
          else
            exit 1
          fi

      - name: Android Release Artifact / Record non-store-ready PR gate
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD == 'true' }}
        shell: bash
        run: |
          {
            echo "store_ready=false"
            echo "artifact=skipped"
            echo "reason=EASYSUBWAY_ENV missing required store privacy release values for PR context"
            echo "toolchain_policy=apps/mobile/release/signed-release-artifact-gate.json"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Android Release Artifact / Audit bundled datapacks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/release-gate"
          node tools/ci/audit-mobile-datapack-assets.mjs --index apps/mobile/assets/datapacks/index.json --root apps/mobile > "${RUNNER_TEMP}/release-gate/mobile-datapack-asset-audit.json"
          echo "EASYSUBWAY_MOBILE_DATAPACK_ASSET_AUDIT=${RUNNER_TEMP}/release-gate/mobile-datapack-asset-audit.json" >> "${GITHUB_ENV}"

      - name: Android Release Artifact / Build Flutter app bundle
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        working-directory: apps/mobile
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easysubway-ci-release.jks
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ci-release-password
          EASYSUBWAY_ANDROID_KEY_ALIAS: ci-release
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ci-release-password
        run: |
          set -euo pipefail
          flutter pub get
          ../../tools/mobile/validate-release-dart-defines.sh \
            --dart-define=EASYSUBWAY_PRIVACY_POLICY_URL="${EASYSUBWAY_PRIVACY_POLICY_URL}" \
            --dart-define=EASYSUBWAY_SUPPORT_EMAIL="${EASYSUBWAY_SUPPORT_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_DELETION_EMAIL="${EASYSUBWAY_DATA_DELETION_EMAIL}" \
            --dart-define=EASYSUBWAY_SECURITY_EMAIL="${EASYSUBWAY_SECURITY_EMAIL}" \
            --dart-define=EASYSUBWAY_ENABLE_PUSH_NOTIFICATIONS=false
          flutter build appbundle --release \
            --dart-define=EASYSUBWAY_PRIVACY_POLICY_URL="${EASYSUBWAY_PRIVACY_POLICY_URL}" \
            --dart-define=EASYSUBWAY_SUPPORT_EMAIL="${EASYSUBWAY_SUPPORT_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_DELETION_EMAIL="${EASYSUBWAY_DATA_DELETION_EMAIL}" \
            --dart-define=EASYSUBWAY_SECURITY_EMAIL="${EASYSUBWAY_SECURITY_EMAIL}" \
            --dart-define=EASYSUBWAY_ENABLE_PUSH_NOTIFICATIONS=false

      - name: Android Release Artifact / Collect release outputs
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/android/app-release.aab
          cp "${EASYSUBWAY_MOBILE_DATAPACK_ASSET_AUDIT}" release-artifacts/android/mobile-datapack-asset-audit.json
          cp release/signed-release-artifact-gate.json release-artifacts/android/signed-release-artifact-gate.json
          cp release/android-16kb-page-size-gate.json release-artifacts/android/android-16kb-page-size-gate.json
          cp release/play-production-access-gate.json release-artifacts/android/play-production-access-gate.json
          cp release/play-store-submission-content.json release-artifacts/android/play-store-submission-content.json
          cp release/play-generated-apk-device-matrix-gate.json release-artifacts/android/play-generated-apk-device-matrix-gate.json
          cp release/post-launch-operations-review-gate.json release-artifacts/android/post-launch-operations-review-gate.json
          cp release/support-incident-response-gate.json release-artifacts/android/support-incident-response-gate.json
          cp release/abuse-penetration-rehearsal-gate.json release-artifacts/android/abuse-penetration-rehearsal-gate.json
          cp release/rc-evidence-manifest-contract.json release-artifacts/android/rc-evidence-manifest-contract.json
          cp ../../tools/mobile/check-android-aab-16kb-page-size.sh release-artifacts/android/check-android-aab-16kb-page-size.sh
          cp ../../tools/mobile/check-elf-load-alignment.mjs release-artifacts/android/check-elf-load-alignment.mjs
          if [[ -f build/app/outputs/mapping/release/mapping.txt ]]; then
            cp build/app/outputs/mapping/release/mapping.txt release-artifacts/android/mapping.txt
          else
            printf 'mapping=not-generated\n' > release-artifacts/android/mapping.txt
          fi
          {
            echo "commit=${GITHUB_SHA}"
            echo "artifact=app-release.aab"
            echo "store_ready=false"
            echo "signing_key_type=temporary-self-signed"
            echo "rc_evidence_manifest=easysubway-rc-evidence-manifest-${GITHUB_SHA}"
            echo "mapping=build/app/outputs/mapping/release/mapping.txt"
            echo "mapping_retention_days=90"
            echo "play_submission_evidence=blocked_missing_internal_track_or_prelaunch_report"
            echo "page_size_16kb_evidence=blocked_until_tools_mobile_check_android_aab_16kb_page_size_passes_and_runtime_PAGE_SIZE_16384_smoke_passes"
            echo "play_production_access_evidence=blocked_until_play_production_access_gate_console_summary_is_satisfied"
            echo "play_app_content_data_safety_listing_evidence=blocked_until_play_store_submission_content_console_summary_is_satisfied"
            echo "play_generated_apk_device_matrix_evidence=blocked_until_play_generated_apk_device_matrix_gate_is_satisfied"
            echo "post_launch_operations_review_evidence=blocked_until_post_launch_operations_review_gate_is_satisfied"
            echo "support_incident_response_evidence=blocked_until_support_incident_response_gate_is_satisfied"
            echo "abuse_penetration_rehearsal_evidence=blocked_until_abuse_penetration_rehearsal_gate_is_satisfied"
            echo "toolchain_policy=apps/mobile/release/signed-release-artifact-gate.json"
          } > release-artifacts/android/release-metadata.txt

      - name: Android Release Artifact / Upload app bundle
        if: ${{ env.EASYSUBWAY_RELEASE_ARTIFACTS_SKIP_BUILD != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-android-release-${{ github.sha }}
          path: apps/mobile/release-artifacts/android
          if-no-files-found: error
          retention-days: 90

      - name: Android Release Artifact / Cleanup sensitive files
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}/easysubway-ci-release.jks" "${RUNNER_TEMP}/easysubway-upload-key.jks" "${RUNNER_TEMP}/easysubway-release.env"

  android-production-rc-release:
    name: Android Production RC Artifact
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.android_rc_signing_mode == 'production-upload-key' }}
    environment:
      name: android-production-rc

    steps:
      - name: Android Production RC Artifact / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Android Production RC Artifact / Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Android Production RC Artifact / Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true

      - name: Android Production RC Artifact / Restore release environment
        shell: bash
        env:
          EASYSUBWAY_ENV_SECRET: ${{ secrets.EASYSUBWAY_ENV }}
        run: |
          set -euo pipefail
          if [[ -z "${EASYSUBWAY_ENV_SECRET}" ]]; then
            printf 'EASYSUBWAY_ENV secret is required for Android production RC builds.\n' >&2
            exit 1
          fi
          env_file="${RUNNER_TEMP}/easysubway-release.env"
          printf '%s' "${EASYSUBWAY_ENV_SECRET}" > "${env_file}"
          node tools/ci/validate-store-privacy-env.mjs \
            --env-file "${env_file}" \
            --github-env "${GITHUB_ENV}" \
            --require-android-rc-production

      - name: Android Production RC Artifact / Restore production upload key
        shell: bash
        env:
          EASYSUBWAY_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/easysubway-upload-key.jks
          EASYSUBWAY_ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.EASYSUBWAY_ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          EASYSUBWAY_ANDROID_STORE_PASSWORD: ${{ secrets.EASYSUBWAY_ANDROID_STORE_PASSWORD }}
          EASYSUBWAY_ANDROID_KEY_ALIAS: ${{ secrets.EASYSUBWAY_ANDROID_KEY_ALIAS }}
          EASYSUBWAY_ANDROID_KEY_PASSWORD: ${{ secrets.EASYSUBWAY_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for required_secret in \
            EASYSUBWAY_ANDROID_UPLOAD_KEYSTORE_BASE64 \
            EASYSUBWAY_ANDROID_STORE_PASSWORD \
            EASYSUBWAY_ANDROID_KEY_ALIAS \
            EASYSUBWAY_ANDROID_KEY_PASSWORD; do
            if [[ -z "${!required_secret}" ]]; then
              printf '%s is required for Android production RC builds.\n' "${required_secret}" >&2
              exit 1
            fi
          done
          echo "::add-mask::${EASYSUBWAY_ANDROID_UPLOAD_KEYSTORE_BASE64}"
          echo "::add-mask::${EASYSUBWAY_ANDROID_STORE_PASSWORD}"
          echo "::add-mask::${EASYSUBWAY_ANDROID_KEY_ALIAS}"
          echo "::add-mask::${EASYSUBWAY_ANDROID_KEY_PASSWORD}"
          umask 077
          printf '%s' "${EASYSUBWAY_ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "${EASYSUBWAY_ANDROID_KEYSTORE_PATH}"
          upload_key_sha256="$(
            keytool -list -v \
              -keystore "${EASYSUBWAY_ANDROID_KEYSTORE_PATH}" \
              -storepass "${EASYSUBWAY_ANDROID_STORE_PASSWORD}" \
              -alias "${EASYSUBWAY_ANDROID_KEY_ALIAS}" |
              awk -F': ' '/SHA256:/{print $2; exit}'
          )"
          if [[ -z "${upload_key_sha256}" ]]; then
            printf 'Upload key SHA-256 fingerprint could not be read from keystore.\n' >&2
            exit 1
          fi
          {
            echo "EASYSUBWAY_ANDROID_KEYSTORE_PATH=${EASYSUBWAY_ANDROID_KEYSTORE_PATH}"
            echo "EASYSUBWAY_ANDROID_STORE_PASSWORD=${EASYSUBWAY_ANDROID_STORE_PASSWORD}"
            echo "EASYSUBWAY_ANDROID_KEY_ALIAS=${EASYSUBWAY_ANDROID_KEY_ALIAS}"
            echo "EASYSUBWAY_ANDROID_KEY_PASSWORD=${EASYSUBWAY_ANDROID_KEY_PASSWORD}"
            echo "EASYSUBWAY_ANDROID_UPLOAD_KEY_SHA256=${upload_key_sha256}"
          } >> "${GITHUB_ENV}"

      - name: Android Production RC Artifact / Build production signed app bundle
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          ../../tools/mobile/validate-release-dart-defines.sh \
            --dart-define=EASYSUBWAY_PRIVACY_POLICY_URL="${EASYSUBWAY_PRIVACY_POLICY_URL}" \
            --dart-define=EASYSUBWAY_SUPPORT_EMAIL="${EASYSUBWAY_SUPPORT_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_DELETION_EMAIL="${EASYSUBWAY_DATA_DELETION_EMAIL}" \
            --dart-define=EASYSUBWAY_SECURITY_EMAIL="${EASYSUBWAY_SECURITY_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_PACK_BASE_URL="${EASYSUBWAY_DATA_PACK_BASE_URL}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_N="${EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_N}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_E="${EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_E}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_KEY_ID="${EASYSUBWAY_DATAPACK_SIGNING_KEY_ID}" \
            --dart-define=EASYSUBWAY_DATAPACK_CHANNEL="${EASYSUBWAY_DATAPACK_CHANNEL}" \
            --dart-define=EASYSUBWAY_ENABLE_PUSH_NOTIFICATIONS=false
          flutter build appbundle --release \
            --dart-define=EASYSUBWAY_PRIVACY_POLICY_URL="${EASYSUBWAY_PRIVACY_POLICY_URL}" \
            --dart-define=EASYSUBWAY_SUPPORT_EMAIL="${EASYSUBWAY_SUPPORT_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_DELETION_EMAIL="${EASYSUBWAY_DATA_DELETION_EMAIL}" \
            --dart-define=EASYSUBWAY_SECURITY_EMAIL="${EASYSUBWAY_SECURITY_EMAIL}" \
            --dart-define=EASYSUBWAY_DATA_PACK_BASE_URL="${EASYSUBWAY_DATA_PACK_BASE_URL}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_N="${EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_N}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_E="${EASYSUBWAY_DATAPACK_SIGNING_PUBLIC_KEY_E}" \
            --dart-define=EASYSUBWAY_DATAPACK_SIGNING_KEY_ID="${EASYSUBWAY_DATAPACK_SIGNING_KEY_ID}" \
            --dart-define=EASYSUBWAY_DATAPACK_CHANNEL="${EASYSUBWAY_DATAPACK_CHANNEL}" \
            --dart-define=EASYSUBWAY_ENABLE_PUSH_NOTIFICATIONS=false

      - name: Android Production RC Artifact / Collect production metadata
        working-directory: apps/mobile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/android/app-release.aab
          cp "${EASYSUBWAY_MOBILE_DATAPACK_ASSET_AUDIT}" release-artifacts/android/mobile-datapack-asset-audit.json
          cp release/signed-release-artifact-gate.json release-artifacts/android/signed-release-artifact-gate.json
          cp release/android-16kb-page-size-gate.json release-artifacts/android/android-16kb-page-size-gate.json
          cp release/android-rc-store-evidence.json release-artifacts/android/android-rc-store-evidence.json
          cp ../../tools/mobile/check-android-aab-16kb-page-size.sh release-artifacts/android/check-android-aab-16kb-page-size.sh
          cp ../../tools/mobile/check-elf-load-alignment.mjs release-artifacts/android/check-elf-load-alignment.mjs
          if [[ -f build/app/outputs/mapping/release/mapping.txt ]]; then
            cp build/app/outputs/mapping/release/mapping.txt release-artifacts/android/mapping.txt
          else
            printf 'mapping=not-generated\n' > release-artifacts/android/mapping.txt
          fi
          version_line="$(awk '/^version:/{print $2; exit}' pubspec.yaml)"
          version_name="${version_line%%+*}"
          version_code="${version_line##*+}"
          aab_sha256="$(sha256sum release-artifacts/android/app-release.aab | awk '{print $1}')"
          data_pack_manifest_sha256="$(sha256sum assets/datapacks/metro_map_pack/manifest.json | awk '{print $1}')"
          {
            echo "gitSha=${GITHUB_SHA}"
            echo "artifact=app-release.aab"
            echo "storeReadyCandidate=true"
            echo "signingKeyType=production-upload-key"
            echo "uploadKeySha256Fingerprint=${EASYSUBWAY_ANDROID_UPLOAD_KEY_SHA256}"
            echo "appSigningKeySha256Fingerprint=${EASYSUBWAY_PLAY_APP_SIGNING_KEY_SHA256}"
            echo "versionName=${version_name}"
            echo "versionCode=${version_code}"
            echo "packageId=com.easysubway.app"
            echo "aabSha256=${aab_sha256}"
            echo "dataPackManifestSha256=${data_pack_manifest_sha256}"
            echo "dataPackChannel=${EASYSUBWAY_DATAPACK_CHANNEL}"
            echo "routeContractVersion=route-map-contract-v1"
            echo "realtimeContractVersion=seoul-topis-schema-v1"
            echo "mapping=build/app/outputs/mapping/release/mapping.txt"
            echo "mappingRetentionDays=90"
            echo "versionCodeMonotonicPolicy=must_be_greater_than_latest_play_uploaded_artifact"
            echo "failedRcVersionCodeReusePolicy=forbidden_without_1020_waiver"
            echo "pageSize16kbEvidence=blocked_until_tools_mobile_check_android_aab_16kb_page_size_passes_and_runtime_PAGE_SIZE_16384_smoke_passes"
            echo "toolchainPolicy=apps/mobile/release/signed-release-artifact-gate.json"
          } > release-artifacts/android/release-metadata.txt

      - name: Android Production RC Artifact / Upload app bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-android-production-rc-${{ github.sha }}
          path: apps/mobile/release-artifacts/android
          if-no-files-found: error
          retention-days: 90

      - name: Android Production RC Artifact / Cleanup sensitive files
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}/easysubway-ci-release.jks" "${RUNNER_TEMP}/easysubway-upload-key.jks" "${RUNNER_TEMP}/easysubway-release.env"

  backend-release:
    name: Backend Release Image
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy == 'true' }}

    steps:
      - name: Backend Release Image / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Backend Release Image / Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Backend Release Image / Build bootJar
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Backend Release Image / Build and inspect image
        shell: bash
        run: |
          set -euo pipefail
          docker build -f backend/Dockerfile -t easysubway-backend:${{ github.sha }} backend
          docker image inspect easysubway-backend:${{ github.sha }}

      - name: Backend Release Image / Validate deployment dry-run
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.example -f infra/docker-compose.yml config --quiet

      - name: Backend Release Image / Collect release metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/backend
          docker image inspect easysubway-backend:${{ github.sha }} > release-artifacts/backend/image-inspect.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "image=easysubway-backend:${GITHUB_SHA}"
            echo "dockerfile=backend/Dockerfile"
            echo "compose=infra/docker-compose.yml"
          } > release-artifacts/backend/release-metadata.txt

      - name: Backend Release Image / Upload image metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-backend-release-${{ github.sha }}
          path: release-artifacts/backend
          if-no-files-found: error
          retention-days: 14

  rc-evidence-manifest:
    name: RC Evidence Manifest
    runs-on: ubuntu-latest
    needs:
      - changes
      - android-release
      - android-production-rc-release
      - backend-release
    permissions:
      contents: read
    if: ${{ always() && (needs.android-release.result == 'success' || needs.android-production-rc-release.result == 'success' || needs.backend-release.result == 'success') }}

    steps:
      - name: RC Evidence Manifest / Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: RC Evidence Manifest / Download Android artifact
        if: ${{ needs.android-release.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: easysubway-android-release-${{ github.sha }}
          path: release-artifacts/downloaded/android

      - name: RC Evidence Manifest / Download Android production RC artifact
        if: ${{ needs.android-production-rc-release.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: easysubway-android-production-rc-${{ github.sha }}
          path: release-artifacts/downloaded/android-production-rc

      - name: RC Evidence Manifest / Download backend artifact
        if: ${{ needs.backend-release.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: easysubway-backend-release-${{ github.sha }}
          path: release-artifacts/downloaded/backend

      - name: RC Evidence Manifest / Generate manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/rc
          generator_args=(
            --repo-root .
            --app-root apps/mobile
            --data-pack-manifest apps/mobile/assets/datapacks/metro_map_pack/manifest.json
            --output release-artifacts/rc/rc-evidence-manifest.json
            --evidence-root ".codex/evidence/release/rc-evidence-manifest/${GITHUB_SHA}/"
            --device local_android_emulator
            --android-version android-15-or-16
            --gate-status androidRcEvidence=BLOCKED_EXTERNAL
            --gate-status productionDatapack=BLOCKED_EXTERNAL
            --gate-status playGeneratedApkDeviceMatrix=BLOCKED_EXTERNAL
            --gate-status backendOperations=BLOCKED_EXTERNAL
            --gate-status postLaunchOperations=BLOCKED_EXTERNAL
            --gate-status androidReleaseQuality=BLOCKED_EXTERNAL
            --gate-status abusePenetrationRehearsal=BLOCKED_EXTERNAL
          )
          android_artifact_source="none"
          if [[ -f release-artifacts/downloaded/android-production-rc/app-release.aab ]]; then
            generator_args+=(--aab release-artifacts/downloaded/android-production-rc/app-release.aab)
            android_artifact_source="easysubway-android-production-rc-${GITHUB_SHA}"
          elif [[ -f release-artifacts/downloaded/android/app-release.aab ]]; then
            generator_args+=(--aab release-artifacts/downloaded/android/app-release.aab)
            android_artifact_source="easysubway-android-release-${GITHUB_SHA}"
          fi
          if [[ -f release-artifacts/downloaded/backend/image-inspect.json ]]; then
            generator_args+=(--backend-image-inspect release-artifacts/downloaded/backend/image-inspect.json)
          fi
          node tools/release/generate-rc-evidence-manifest.mjs "${generator_args[@]}"
          cp apps/mobile/release/rc-evidence-manifest-contract.json release-artifacts/rc/rc-evidence-manifest-contract.json
          {
            echo "commit=${GITHUB_SHA}"
            echo "manifest=rc-evidence-manifest.json"
            echo "android_artifact_source=${android_artifact_source}"
            echo "backend_artifact_source=easysubway-backend-release-${GITHUB_SHA}"
          } > release-artifacts/rc/release-metadata.txt

      - name: RC Evidence Manifest / Upload manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: easysubway-rc-evidence-manifest-${{ github.sha }}
          path: release-artifacts/rc
          if-no-files-found: error
          retention-days: 90

  notify-slack-release-result:
    name: Slack / Release artifacts result
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - changes
      - android-release
      - android-production-rc-release
      - backend-release
      - rc-evidence-manifest
    if: >-
      ${{
        always() &&
        github.event_name != 'pull_request' &&
        (needs.changes.result == 'success' || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
      }}
    env:
      SLACK_RELEASE_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_WEBHOOK_URL }}
    steps:
      - name: Slack / Skip missing release webhook
        if: ${{ env.SLACK_RELEASE_WEBHOOK_URL == '' }}
        run: echo "::notice title=Slack notification::SLACK_RELEASE_WEBHOOK_URL is not configured."

      - name: Slack / Notify release artifacts result
        if: ${{ env.SLACK_RELEASE_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ env.SLACK_RELEASE_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "EasySubway release artifacts ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    *EasySubway Release Artifacts ${{ contains(needs.*.result, 'failure') && '실패' || contains(needs.*.result, 'cancelled') && '취소' || '성공' }}*
                    • repo: `${{ github.repository }}`
                    • ref: `${{ github.ref_name }}`
                    • actor: `${{ github.actor }}`
                    • run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions 열기>
