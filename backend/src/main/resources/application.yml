spring:
  application:
    name: easysubway-backend
  profiles:
    default: dev
  batch:
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: "health,info"

easysubway:
  notifications:
    push:
      delivery:
        enabled: ${EASYSUBWAY_PUSH_DELIVERY_ENABLED:false}
        initial-delay-ms: ${EASYSUBWAY_PUSH_DELIVERY_INITIAL_DELAY_MS:10000}
        fixed-delay-ms: ${EASYSUBWAY_PUSH_DELIVERY_FIXED_DELAY_MS:60000}
