<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>시설 상태 관리</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 20px;
			font-size: 32px;
			line-height: 1.2;
		}

		.summary {
			margin: 0 0 20px;
			color: #29484b;
			font-size: 17px;
			font-weight: 700;
			line-height: 1.45;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		th,
		td {
			padding: 14px 12px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			line-height: 1.45;
		}

		th {
			background: #eaf0f0;
			font-weight: 900;
		}

		td {
			font-weight: 650;
		}

		.meta {
			display: block;
			margin-top: 4px;
			color: #406164;
			font-size: 14px;
			font-weight: 700;
		}

		form {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			align-items: center;
		}

		select {
			min-height: 44px;
			min-width: 136px;
			padding: 0 10px;
			border: 1px solid #8aa0a3;
			border-radius: 6px;
			background: #fff;
			color: #102a2c;
			font-size: 16px;
			font-weight: 800;
		}

		button {
			min-height: 44px;
			padding: 0 16px;
			border: 0;
			border-radius: 6px;
			background: #003d40;
			color: #fff;
			font-size: 16px;
			font-weight: 900;
			cursor: pointer;
		}

		.empty {
			padding: 24px;
			background: #fff;
			border: 1px solid #d8e0e0;
			font-weight: 800;
		}
	</style>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-facilities')}"></div>
<main class="admin-main">
	<header class="admin-page-head">
		<div>
			<h1>시설 상태판</h1>
			<p>모든 접근성 시설의 상태·신뢰도·갱신일을 필터링하고 즉시 변경합니다.</p>
		</div>
		<div class="admin-actions">
			<a class="admin-btn" th:href="@{/admin/facilities/editor/page}">시설 등록·수정</a>
		</div>
	</header>
	<p class="summary">역 상세와 경로 안내에 쓰는 시설 상태를 확인하고 수정합니다.</p>
	<div class="alert warning" th:if="${!masterDataWritable}">
		<strong>읽기 전용 마스터 데이터</strong>
		<p>현재 운영 데이터는 저장할 수 없어 상태 변경 요청이 차단됩니다.</p>
	</div>
	<div class="alert warning" th:if="${masterDataError}">
		<strong>저장 요청 차단</strong>
		<p th:text="${masterDataError}">운영 마스터 데이터가 읽기 전용입니다.</p>
	</div>
	<div th:replace="~{admin/fragments/form-errors :: summary}"></div>

	<p class="empty" th:if="${facilities.isEmpty()}">등록된 시설이 없습니다.</p>
	<table th:if="${!facilities.isEmpty()}">
		<thead>
		<tr>
			<th scope="col">시설</th>
			<th scope="col">역</th>
			<th scope="col">현재 상태</th>
			<th scope="col">신뢰도</th>
			<th scope="col">갱신일</th>
			<th scope="col">상태 변경</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="facility : ${facilities}">
			<td>
				<span th:text="${facility.facilityName}">1번 출구 엘리베이터</span>
				<span class="meta" th:text="${facility.typeLabel}">엘리베이터</span>
				<span class="meta" th:text="${facility.facilityId}">facility-id</span>
			</td>
			<td>
				<span th:text="${facility.stationName}">상록수</span>
				<span class="meta" th:text="${facility.stationId}">station-id</span>
			</td>
			<td th:text="${facility.statusLabel}">정상</td>
			<td th:text="${facility.confidenceLabel}">정보 신뢰도 높음</td>
			<td th:text="${facility.lastUpdatedAt}">2026-06-12</td>
			<td>
				<form th:action="@{/admin/facilities/{facilityId}/page/status(facilityId=${facility.facilityId})}"
				      method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<input type="hidden" name="commandToken" th:value="${commandToken}">
					<label>
						<span class="meta">변경할 상태</span>
						<select name="status">
							<option th:each="option : ${statusOptions}"
							        th:value="${option.value}"
							        th:selected="${option.value == facility.status}"
							        th:text="${option.label}">정상</option>
						</select>
					</label>
					<button type="submit" th:disabled="${!masterDataWritable}">저장</button>
				</form>
			</td>
		</tr>
		</tbody>
	</table>
	<div th:replace="~{admin/fragments/pagination :: pager('시설 상태 목록 페이지', ${page}, ${paginationLinks})}"></div>
</main>
</div>
</body>
</html>
