<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>푸시 알림 현황</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric {
			background: #fff;
			border: 1px solid #d8e0e0;
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		.failure-reason {
			margin: -8px 0 24px;
			padding: 14px 18px;
			background: #fff7ed;
			border: 1px solid #fed7aa;
			color: #7c2d12;
			font-weight: 800;
			line-height: 1.45;
		}

		.delivery-alert {
			margin: -8px 0 24px;
			padding: 14px 18px;
			font-weight: 800;
			line-height: 1.45;
		}

		.delivery-alert.failure {
			background: #fef2f2;
			border: 1px solid #fecaca;
			color: #7f1d1d;
		}

		.delivery-alert.ok {
			background: #ecfdf5;
			border: 1px solid #bbf7d0;
			color: #14532d;
		}

		.delivery-alert.pending {
			background: #f8fafc;
			border: 1px solid #cbd5e1;
			color: #334155;
		}

		section {
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:last-child,
		th:last-child {
			text-align: right;
			font-weight: 800;
		}
	</style>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-push')}"></div>
<main id="admin-content" class="admin-main">
	<div th:replace="~{admin/fragments/shell :: topbar}"></div>
	<header class="admin-page-head">
		<div>
			<h1>푸시 알림</h1>
			<p>발송 성공률·실패 원인을 확인하고 특정 사용자 알림을 생성·전달합니다.</p>
		</div>
	</header>

	<div class="metric-grid" aria-label="푸시 알림 outbox 요약">
		<div class="metric">
			<span>전체 알림</span>
			<strong th:text="${summary.totalCount}">0</strong>
		</div>
		<div class="metric">
			<span>대기 중</span>
			<strong th:text="${summary.pendingCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 완료</span>
			<strong th:text="${summary.sentCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 실패</span>
			<strong th:text="${summary.failedCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 시도</span>
			<strong th:text="${summary.deliveryAttemptCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 성공률</span>
			<strong th:text="${summary.successRateLabel}">0.0%</strong>
		</div>
		<div class="metric">
			<span>발송 실패율</span>
			<strong th:text="${summary.failureRateLabel}">0.0%</strong>
		</div>
	</div>

	<p th:class="'delivery-alert ' + ${summary.failureAlertClass}"
	   th:text="${summary.failureAlertLabel} + ': ' + ${summary.failureAlertDescription}">
		점검 필요: 발송 실패가 있어 푸시 어댑터와 provider 상태를 확인하세요.
	</p>

	<p class="failure-reason"
	   th:if="${summary.latestFailureReason != null}"
	   th:text="'최근 실패: ' + ${summary.latestFailureReason}">최근 실패: 외부 푸시 발송 어댑터가 설정되지 않았습니다.</p>

	<section>
		<h2>상태별 알림</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">상태</th>
				<th scope="col">설명</th>
				<th scope="col">건수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.statusRows}">
				<td th:text="${row.label}">대기 중</td>
				<td th:text="${row.description}">아직 발송 처리 전</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</div>
</body>
</html>
