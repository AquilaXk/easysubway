<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>푸시 알림 현황</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric {
			background: #fff;
			border: 1px solid #d8e0e0;
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		section {
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:last-child,
		th:last-child {
			text-align: right;
			font-weight: 800;
		}
	</style>
</head>
<body>
<main>
	<h1>푸시 알림 현황</h1>

	<div class="metric-grid" aria-label="푸시 알림 outbox 요약">
		<div class="metric">
			<span>전체 알림</span>
			<strong th:text="${summary.totalCount}">0</strong>
		</div>
		<div class="metric">
			<span>대기 중</span>
			<strong th:text="${summary.pendingCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 완료</span>
			<strong th:text="${summary.sentCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 실패</span>
			<strong th:text="${summary.failedCount}">0</strong>
		</div>
	</div>

	<section>
		<h2>상태별 알림</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">상태</th>
				<th scope="col">설명</th>
				<th scope="col">건수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.statusRows}">
				<td th:text="${row.label}">대기 중</td>
				<td th:text="${row.description}">아직 발송 처리 전</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</body>
</html>
