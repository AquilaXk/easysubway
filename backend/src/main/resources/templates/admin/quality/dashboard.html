<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>데이터 품질 대시보드</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric {
			background: #fff;
			border: 1px solid #d8e0e0;
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		section {
			margin-bottom: 24px;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:last-child,
		th:last-child {
			text-align: right;
			font-weight: 800;
		}
	</style>
</head>
<body>
<main>
	<h1>데이터 품질 대시보드</h1>

	<div class="metric-grid" aria-label="전체 데이터 품질 요약">
		<div class="metric">
			<span>전체 역</span>
			<strong th:text="${summary.totalStations}">0</strong>
		</div>
		<div class="metric">
			<span>전체 출구</span>
			<strong th:text="${summary.totalExits}">0</strong>
		</div>
		<div class="metric">
			<span>전체 시설</span>
			<strong th:text="${summary.totalFacilities}">0</strong>
		</div>
		<div class="metric">
			<span>확인 필요한 시설</span>
			<strong th:text="${summary.needsVerificationFacilityCount}">0</strong>
		</div>
		<div class="metric">
			<span>검수일 없는 역</span>
			<strong th:text="${summary.missingStationVerificationDateCount}">0</strong>
		</div>
	</div>

	<section>
		<h2>역 품질 등급</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">등급</th>
				<th scope="col">상태</th>
				<th scope="col">역 수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.stationQualityRows}">
				<td th:text="${row.label}">Level 1</td>
				<td th:text="${row.description}">기본 정보 확인</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>

	<section>
		<h2>출구 신뢰도</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">신뢰도</th>
				<th scope="col">출구 수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.exitConfidenceRows}">
				<td th:text="${row.label}">높음</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>

	<section>
		<h2>시설 신뢰도</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">신뢰도</th>
				<th scope="col">시설 수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.facilityConfidenceRows}">
				<td th:text="${row.label}">높음</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</body>
</html>
