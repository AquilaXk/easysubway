<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>공통코드</title>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-codes')}"></div>
<main class="admin-main">
	<header class="admin-page-head">
		<div>
			<h1>공통코드</h1>
			<p>운영자가 반복 선택하는 사유와 상태만 관리합니다.</p>
		</div>
	</header>

	<section>
		<h2>Group</h2>
		<form method="get" th:action="@{/admin/codes/page}">
			<label for="code-group-filter">Group</label>
			<select id="code-group-filter" name="groupCode">
				<option th:each="group : ${groups}"
				        th:value="${group.groupCode}"
				        th:selected="${group.groupCode == selectedGroup}"
				        th:text="${group.displayName}">신고 반려 사유</option>
			</select>
			<button type="submit">조회</button>
		</form>
	</section>

	<section>
		<h2>Code</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">Code</th>
				<th scope="col">이름</th>
				<th scope="col">설명</th>
				<th scope="col">정렬</th>
				<th scope="col">상태</th>
				<th scope="col">관리</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="code : ${codes}">
				<td th:text="${code.code}">DUPLICATE</td>
				<td th:text="${code.displayName}">중복 제보</td>
				<td th:text="${code.description}">설명</td>
				<td th:text="${code.sortOrder}">10</td>
				<td th:text="${code.enabledLabel}">선택 가능</td>
				<td>
					<form th:if="${code.enabled}" th:action="@{'/admin/codes/' + ${code.groupCode} + '/' + ${code.code} + '/disable'}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<button type="submit">비활성화</button>
					</form>
				</td>
			</tr>
			</tbody>
		</table>
	</section>

	<section>
		<h2>Code 추가·수정</h2>
		<form method="post" th:action="@{/admin/codes}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<input type="hidden" name="groupCode" th:value="${selectedGroup}">
			<label>Code <input name="code" required></label>
			<label>이름 <input name="displayName" required></label>
			<label>설명 <input name="description"></label>
			<label>정렬 <input name="sortOrder" type="number" min="0" value="0"></label>
			<label><input name="enabled" type="checkbox" value="true" checked> 신규 선택 가능</label>
			<button type="submit">저장</button>
		</form>
	</section>
</main>
</div>
</body>
</html>
