<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>장애관리</title>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-incidents')}"></div>
<main class="admin-main">
	<header class="admin-page-head">
		<div>
			<h1>장애관리</h1>
			<p>health와 batch에서 확인한 운영 이벤트를 incident로 추적합니다.</p>
		</div>
	</header>

	<section>
		<h2>Health 연결</h2>
		<p th:text="${'현재 health: ' + healthStatus}">현재 health: UP</p>
		<form th:if="${healthStatus != 'UP'}" method="post" th:action="@{/admin/incidents/health}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<input type="hidden" name="commandToken" th:value="${commandTokens.next()}">
			<button type="submit">Health incident 생성</button>
		</form>
	</section>

	<section>
		<h2>Incident 생성</h2>
		<form method="post" th:action="@{/admin/incidents}">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<input type="hidden" name="commandToken" th:value="${commandTokens.next()}">
			<label>심각도
				<select name="severity">
					<option th:each="option : ${severityOptions}" th:value="${option.code}" th:text="${option.displayName}">Major</option>
				</select>
			</label>
			<input type="hidden" name="status" value="OPEN">
			<label>상태
				<select disabled>
					<option th:each="option : ${statusOptions}" th:if="${option.code == 'OPEN'}" th:text="${option.displayName}" selected>Open</option>
				</select>
			</label>
			<label>출처
				<select name="source">
					<option th:each="option : ${sourceOptions}" th:value="${option.code}" th:text="${option.displayName}">Health</option>
				</select>
			</label>
			<label>요약 <input name="summary" required></label>
			<label>담당자 <input name="owner"></label>
			<button type="submit">생성</button>
		</form>
	</section>

	<section>
		<h2>최근 Incident</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">ID</th>
				<th scope="col">심각도</th>
				<th scope="col">상태</th>
				<th scope="col">출처</th>
				<th scope="col">요약</th>
				<th scope="col">담당자</th>
				<th scope="col">시작</th>
				<th scope="col">해결</th>
				<th scope="col">관리</th>
			</tr>
			</thead>
			<tbody>
			<tr th:if="${incidents.isEmpty()}">
				<td colspan="9">최근 incident가 없습니다.</td>
			</tr>
			<tr th:each="incident : ${incidents}">
				<td th:text="${incident.incidentId}">INC-1</td>
				<td th:text="${incident.severity}">MAJOR</td>
				<td th:text="${incident.status}">OPEN</td>
				<td th:text="${incident.source}">HEALTH</td>
				<td th:text="${incident.summary}">요약</td>
				<td th:text="${incident.owner}">admin</td>
				<td th:text="${incident.openedAt}">2026-06-27T00:00</td>
				<td th:text="${incident.resolvedAt}">-</td>
				<td>
					<form th:if="${incident.open}" th:action="@{'/admin/incidents/' + ${incident.incidentId} + '/resolve'}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<input type="hidden" name="commandToken" th:value="${commandTokens.next()}">
						<label for="incident-resolution" th:for="${'incident-resolution-' + incident.incidentId}">해결 기록</label>
						<input id="incident-resolution" th:id="${'incident-resolution-' + incident.incidentId}" name="resolution" required placeholder="해결 기록">
						<button type="submit">해결</button>
					</form>
					<span th:unless="${incident.open}" th:text="${incident.resolution}">해결됨</span>
				</td>
			</tr>
			</tbody>
		</table>
		<div th:replace="~{admin/fragments/pagination :: pager('Incident 목록 페이지', ${page}, ${paginationLinks})}"></div>
	</section>
</main>
</div>
</body>
</html>
