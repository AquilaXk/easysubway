<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>시설 신고 검수</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		.status-filter {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 20px;
		}

		.status-filter a {
			display: inline-flex;
			align-items: center;
			min-height: 40px;
			padding: 0 14px;
			border: 1px solid #7b9294;
			border-radius: 6px;
			background: #fff;
			color: #102a2c;
			font-weight: 700;
			text-decoration: none;
		}

		.status-filter a[aria-current="page"] {
			background: #003d40;
			color: #fff;
			border-color: #003d40;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		th,
		td {
			padding: 14px 12px;
			border-bottom: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #eaf0f0;
			font-weight: 800;
		}

		.empty {
			padding: 40px 12px;
			text-align: center;
			color: #536b6d;
			font-weight: 700;
		}

		.detail-link {
			color: #005e68;
			font-weight: 800;
		}
	</style>
</head>
<body>
<main>
	<h1>시설 신고 검수</h1>

	<nav class="status-filter" aria-label="신고 상태 필터">
		<a th:href="@{/admin/reports/page}" th:attr="aria-current=${selectedStatus == null ? 'page' : null}">전체</a>
		<a th:each="statusOption : ${statusOptions}"
		   th:href="@{/admin/reports/page(status=${statusOption.value})}"
		   th:attr="aria-current=${selectedStatus == statusOption.value ? 'page' : null}"
		   th:text="${statusOption.label}">접수됨</a>
	</nav>

	<table>
		<thead>
		<tr>
			<th scope="col">상태</th>
			<th scope="col">유형</th>
			<th scope="col">신고 내용</th>
			<th scope="col">역 ID</th>
			<th scope="col">시설 ID</th>
			<th scope="col">좌표</th>
			<th scope="col">사진</th>
			<th scope="col">상세</th>
		</tr>
		</thead>
		<tbody>
		<tr th:if="${reports.isEmpty()}">
			<td class="empty" colspan="8">확인할 신고가 없습니다.</td>
		</tr>
		<tr th:each="report : ${reports}">
			<td th:text="${report.statusLabel}">접수됨</td>
			<td th:text="${report.reportTypeLabel}">고장</td>
			<td th:text="${report.description}">신고 내용</td>
			<td th:text="${report.stationId}">station-id</td>
			<td th:text="${report.facilityId}">facility-id</td>
			<td th:text="${report.coordinateLabel}">위치 없음</td>
			<td th:text="${report.hasPhoto ? '있음' : '없음'}">없음</td>
			<td>
				<a class="detail-link"
				   th:href="@{/admin/reports/{reportId}/page(reportId=${report.id})}">상세 보기</a>
			</td>
		</tr>
		</tbody>
	</table>
</main>
</body>
</html>
