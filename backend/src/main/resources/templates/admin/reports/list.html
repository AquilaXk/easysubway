<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>시설 신고 검수</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		.surge-alert {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			gap: 12px;
			align-items: center;
			margin-bottom: 20px;
			padding: 16px 18px;
			border: 1px solid #c9d6d7;
			border-left: 6px solid #006d6f;
			background: #fff;
		}

		.surge-alert.warning {
			border-left-color: #c84a12;
			background: #fff8f3;
		}

		.surge-alert h2 {
			margin: 0 0 6px;
			font-size: 18px;
			line-height: 1.3;
		}

		.surge-alert p {
			margin: 0;
			color: #3f5658;
			font-size: 15px;
			line-height: 1.45;
		}

		.surge-alert .status-label {
			justify-self: end;
			padding: 6px 10px;
			border-radius: 6px;
			background: #e3f2ef;
			color: #003d40;
			font-weight: 800;
			white-space: nowrap;
		}

		.surge-alert.warning .status-label {
			background: #ffe8d9;
			color: #8f2d00;
		}

		.processing-time {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			gap: 12px;
			align-items: center;
			margin-bottom: 20px;
			padding: 16px 18px;
			border: 1px solid #c9d6d7;
			border-left: 6px solid #005e68;
			background: #fff;
		}

		.processing-time.empty {
			border-left-color: #7b9294;
		}

		.processing-time h2 {
			margin: 0 0 6px;
			font-size: 18px;
			line-height: 1.3;
		}

		.processing-time p {
			margin: 0;
			color: #3f5658;
			font-size: 15px;
			line-height: 1.45;
		}

		.processing-time .metric-label {
			justify-self: end;
			padding: 6px 10px;
			border-radius: 6px;
			background: #e4f0ff;
			color: #06436f;
			font-weight: 800;
			white-space: nowrap;
		}

		.processing-time.empty .metric-label {
			background: #eef2f2;
			color: #465f61;
		}

		.status-filter {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 20px;
		}

		.status-filter a {
			display: inline-flex;
			align-items: center;
			min-height: 40px;
			padding: 0 14px;
			border: 1px solid #7b9294;
			border-radius: 6px;
			background: #fff;
			color: #102a2c;
			font-weight: 700;
			text-decoration: none;
		}

		.status-filter a[aria-current="page"] {
			background: #003d40;
			color: #fff;
			border-color: #003d40;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		th,
		td {
			padding: 14px 12px;
			border-bottom: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #eaf0f0;
			font-weight: 800;
		}

		.empty {
			padding: 40px 12px;
			text-align: center;
			color: #536b6d;
			font-weight: 700;
		}

		.detail-link {
			color: #005e68;
			font-weight: 800;
		}

		.pagination {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			gap: 12px;
			margin-top: 18px;
		}

		.pagination a,
		.pagination span {
			display: inline-flex;
			align-items: center;
			min-height: 40px;
			padding: 0 14px;
			border: 1px solid #7b9294;
			border-radius: 6px;
			background: #fff;
			color: #102a2c;
			font-weight: 800;
			text-decoration: none;
		}

		.pagination span {
			background: #eaf0f0;
		}
	</style>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-reports')}"></div>
<main class="admin-main">
	<header class="admin-page-head">
		<div>
			<h1>시설 신고 검수</h1>
			<p>상태·사진·위치·접수일 기준으로 제보를 검수 큐에 배치합니다.</p>
		</div>
	</header>

	<section class="surge-alert"
	         th:classappend="${reportSurgeAlert.alertClass}"
	         aria-label="신고 급증 알림">
		<div>
			<h2 th:text="${reportSurgeAlert.title}">신고 급증</h2>
			<p th:text="${reportSurgeAlert.description}">최근 24시간 신고 0건입니다. 접수량은 정상 범위입니다.</p>
		</div>
		<strong class="status-label" th:text="${reportSurgeAlert.label}">정상</strong>
	</section>

	<section class="processing-time"
	         th:classappend="${processingTime.metricClass}"
	         aria-label="신고 처리 시간 지표">
		<div>
			<h2 th:text="${processingTime.title}">신고 처리 시간</h2>
			<p th:text="${processingTime.description}">검수 완료 후 평균 처리 시간을 표시합니다.</p>
		</div>
		<strong class="metric-label" th:text="${processingTime.label}">처리 완료 신고 없음</strong>
	</section>

	<nav class="status-filter" aria-label="신고 상태 필터">
		<a th:href="@{/admin/reports/page}" th:attr="aria-current=${selectedStatus == null ? 'page' : null}">전체</a>
		<a th:each="statusOption : ${statusOptions}"
		   th:href="@{/admin/reports/page(status=${statusOption.value})}"
		   th:attr="aria-current=${selectedStatus == statusOption.value ? 'page' : null}"
		   th:text="${statusOption.label}">접수됨</a>
	</nav>

	<table>
		<thead>
		<tr>
			<th scope="col">상태</th>
			<th scope="col">유형</th>
			<th scope="col">신고 내용</th>
			<th scope="col">역 ID</th>
			<th scope="col">시설 ID</th>
			<th scope="col">좌표</th>
			<th scope="col">사진</th>
			<th scope="col">상세</th>
		</tr>
		</thead>
		<tbody>
		<tr th:if="${reports.isEmpty()}">
			<td class="empty" colspan="8">확인할 신고가 없습니다.</td>
		</tr>
		<tr th:each="report : ${reports}">
			<td th:text="${report.statusLabel}">접수됨</td>
			<td th:text="${report.reportTypeLabel}">고장</td>
			<td th:text="${report.description}">신고 내용</td>
			<td th:text="${report.stationId}">station-id</td>
			<td th:text="${report.facilityId}">facility-id</td>
			<td th:text="${report.coordinateLabel}">위치 없음</td>
			<td th:text="${report.hasPhoto ? '있음' : '없음'}">없음</td>
			<td>
				<a class="detail-link"
				   th:href="@{/admin/reports/{reportId}/page(reportId=${report.id})}">상세 보기</a>
			</td>
		</tr>
		</tbody>
	</table>

	<nav class="pagination" aria-label="신고 목록 페이지">
		<a th:if="${page.hasPrevious}"
		   th:href="@{/admin/reports/page(status=${selectedStatus},page=${page.previousPage},size=${page.size})}">이전</a>
		<span th:text="${page.page + 1} + '페이지'">1페이지</span>
		<a th:if="${page.hasNext}"
		   th:href="@{/admin/reports/page(status=${selectedStatus},page=${page.nextPage},size=${page.size})}">다음</a>
	</nav>
</main>
</div>
</body>
</html>
