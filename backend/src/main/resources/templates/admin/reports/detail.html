<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>신고 상세</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 920px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 20px;
			font-size: 32px;
			line-height: 1.2;
		}

		.back-link {
			display: inline-block;
			margin-bottom: 24px;
			color: #005e68;
			font-weight: 800;
		}

		section {
			margin-bottom: 24px;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		dl {
			display: grid;
			grid-template-columns: minmax(120px, 180px) 1fr;
			margin: 0;
		}

		dt,
		dd {
			margin: 0;
			padding: 14px 18px;
			border-top: 1px solid #d8e0e0;
			line-height: 1.5;
		}

		dt {
			font-weight: 800;
			background: #f8fbfb;
		}

		dd {
			font-weight: 600;
		}

		.photo-preview {
			max-width: 100%;
			max-height: 420px;
			margin-top: 10px;
			border: 1px solid #d8e0e0;
		}

		.review-form {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			padding: 18px;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		button {
			min-height: 44px;
			padding: 0 16px;
			border: 0;
			border-radius: 6px;
			background: #003d40;
			color: #fff;
			font-size: 16px;
			font-weight: 800;
			cursor: pointer;
		}

		button.secondary {
			background: #6b4b00;
		}

		button.danger {
			background: #8a1d1d;
		}
	</style>
</head>
<body>
<main>
	<a class="back-link" th:href="@{/admin/reports/page}">목록으로</a>
	<h1>신고 상세</h1>

	<section>
		<h2>신고 내용</h2>
		<dl>
			<dt>신고 번호</dt>
			<dd th:text="${report.id}">report-id</dd>
			<dt>상태</dt>
			<dd th:text="${report.statusLabel}">접수됨</dd>
			<dt>유형</dt>
			<dd th:text="${report.reportTypeLabel}">고장</dd>
			<dt>내용</dt>
			<dd th:text="${report.description}">신고 내용</dd>
			<dt>역 ID</dt>
			<dd th:text="${report.stationId}">station-id</dd>
			<dt>시설 ID</dt>
			<dd th:text="${report.facilityId}">facility-id</dd>
			<dt>신고자</dt>
			<dd th:text="${report.userId}">user-id</dd>
			<dt>좌표</dt>
			<dd th:text="${report.coordinateLabel}">위치 없음</dd>
			<dt>접수일</dt>
			<dd th:text="${report.createdAt}">2026-06-15T10:00:00</dd>
		</dl>
	</section>

	<section>
		<h2>사진</h2>
		<dl>
			<dt>파일명</dt>
			<dd th:text="${report.hasPhoto() ? report.photoFileName : '없음'}">없음</dd>
			<dt>미리보기</dt>
			<dd>
				<span th:if="${!report.hasPhoto()}">없음</span>
				<img th:if="${report.hasPhoto()}"
				     class="photo-preview"
				     th:src="'data:' + ${report.photoContentType} + ';base64,' + ${report.photoDataBase64}"
				     alt="첨부 사진">
			</dd>
		</dl>
	</section>

	<section>
		<h2>검수 기록</h2>
		<dl>
			<dt>검수자</dt>
			<dd th:text="${report.reviewedBy != null ? report.reviewedBy : '없음'}">없음</dd>
			<dt>검수일</dt>
			<dd th:text="${report.reviewedAt != null ? report.reviewedAt : '없음'}">없음</dd>
			<dt>기준 신고</dt>
			<dd th:text="${report.duplicateOfReportId != null ? report.duplicateOfReportId : '없음'}">없음</dd>
		</dl>
	</section>

	<form class="review-form"
	      th:action="@{/admin/reports/{reportId}/page/review(reportId=${report.id})}"
	      method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<label>
			기준 신고 ID
			<input name="duplicateOfReportId" type="text" autocomplete="off" placeholder="중복 처리할 때 입력">
		</label>
		<button type="submit" name="decision" value="ACCEPT">승인</button>
		<button class="danger" type="submit" name="decision" value="REJECT">반려</button>
		<button class="secondary" type="submit" name="decision" value="MARK_DUPLICATE">중복 처리</button>
	</form>
</main>
</body>
</html>
