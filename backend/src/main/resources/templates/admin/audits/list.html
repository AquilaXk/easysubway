<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${title}">관리자 감사</title>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar(${activeProgram})}"></div>
<main class="admin-main">
	<header class="admin-page-head">
		<div>
			<h1 th:text="${title}">관리자 감사</h1>
			<p>관리자 작업과 개인정보 조회 이력을 확인합니다.</p>
		</div>
	</header>
	<section>
		<table>
			<thead>
			<tr>
				<th scope="col">발생</th>
				<th scope="col">유형</th>
				<th scope="col">actor</th>
				<th scope="col">권한</th>
				<th scope="col">target</th>
				<th scope="col">action</th>
				<th scope="col">결과</th>
				<th scope="col">사유</th>
			</tr>
			</thead>
			<tbody>
			<tr th:if="${events.isEmpty()}">
				<td colspan="8">감사 이벤트가 없습니다.</td>
			</tr>
			<tr th:each="event : ${events}">
				<td th:text="${event.occurredAt}">2026-06-27T00:00</td>
				<td th:text="${event.eventType}">ADMIN_ACTION</td>
				<td th:text="${event.actor}">admin</td>
				<td th:text="${event.rolePermission}">admin.view</td>
				<td><span th:text="${event.targetType}">target</span> <span class="meta" th:text="${event.targetId}">id</span></td>
				<td th:text="${event.action}">action</td>
				<td th:text="${event.outcome}">SUCCESS</td>
				<td th:text="${event.reason}">-</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</div>
</body>
</html>
