<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>사용자 활동 현황</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric,
		section {
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		.metric {
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		.api-error-alert {
			background: #fff;
			border: 1px solid #d8e0e0;
			margin-bottom: 24px;
			padding: 18px;
		}

		.api-error-alert.warning {
			border-color: #d37c75;
		}

		.api-error-alert.ok {
			border-color: #82c69b;
		}

		.api-error-alert strong,
		.api-error-alert span,
		.api-error-alert p {
			display: block;
			line-height: 1.4;
		}

		.api-error-alert strong {
			font-size: 20px;
		}

		.api-error-alert span,
		.api-error-alert p {
			margin: 8px 0 0;
			color: #40585a;
			font-weight: 700;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:last-child,
		th:last-child {
			text-align: right;
			font-weight: 800;
		}
	</style>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-usage')}"></div>
<main id="admin-content" class="admin-main">
	<div th:replace="~{admin/fragments/shell :: topbar}"></div>
	<header class="admin-page-head">
		<div>
			<h1>사용 현황</h1>
			<p>7일 활성 사용자, API 요청·오류율·응답 시간을 확인합니다.</p>
		</div>
	</header>

	<div class="metric-grid" aria-label="사용자 활동 요약">
		<div class="metric">
			<span>최근 7일 활성 사용자</span>
			<strong th:text="${summary.totalActiveUsers}">0</strong>
		</div>
		<div class="metric">
			<span>API 요청</span>
			<strong th:text="${summary.totalApiRequests}">0</strong>
		</div>
		<div class="metric">
			<span>오류 응답</span>
			<strong th:text="${summary.totalApiErrors}">0</strong>
		</div>
		<div class="metric">
			<span>API 오류율</span>
			<strong th:text="${summary.apiErrorRatePercent}">0.0%</strong>
		</div>
		<div class="metric">
			<span>평균 응답 시간</span>
			<strong th:text="${summary.averageApiResponseTimeLabel}">0ms</strong>
		</div>
	</div>

	<div class="api-error-alert" th:classappend="${summary.apiErrorAlertClass}">
		<strong>API 오류율 상태: <span th:text="${summary.apiErrorAlertLabel}">정상</span></strong>
		<span>최근 7일 오류율: <b th:text="${summary.apiErrorRatePercent}">0.0%</b></span>
		<p th:text="${summary.apiErrorAlertDescription}">최근 7일 API 오류율이 기준치 미만입니다.</p>
	</div>

	<section>
		<h2>일별 활성 사용자</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">날짜</th>
				<th scope="col">고유 사용자</th>
				<th scope="col">API 요청</th>
				<th scope="col">오류 응답</th>
				<th scope="col">API 오류율</th>
				<th scope="col">평균 응답 시간</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.dailyActivityRows}">
				<td th:text="${row.dateLabel}">2026-06-17</td>
				<td th:text="${row.activeUserCount}">0</td>
				<td th:text="${row.apiRequestCount}">0</td>
				<td th:text="${row.apiErrorCount}">0</td>
				<td th:text="${row.apiErrorRatePercent}">0.0%</td>
				<td th:text="${row.averageApiResponseTimeLabel}">0ms</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</div>
</body>
</html>
