<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>데이터 수집 배치</title>
	<style>
		body {
			margin: 0;
			background: #f6f8f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 24px;
			font-size: 32px;
			line-height: 1.2;
		}

		.run-form {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-bottom: 24px;
			padding: 18px;
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		.run-form label {
			display: flex;
			align-items: center;
			min-height: 44px;
			gap: 8px;
			font-weight: 800;
		}

		button {
			min-height: 44px;
			padding: 0 16px;
			border: 0;
			border-radius: 6px;
			background: #003d40;
			color: #fff;
			font-size: 16px;
			font-weight: 800;
			cursor: pointer;
		}

		section {
			background: #fff;
			border: 1px solid #d8e0e0;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #eaf0f0;
			font-size: 20px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 12px;
			border-top: 1px solid #d8e0e0;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		.empty {
			padding: 40px 12px;
			text-align: center;
			color: #536b6d;
			font-weight: 700;
		}
	</style>
	<link rel="stylesheet" th:href="@{/css/admin-v3.css}">
</head>
<body class="admin-v3">
<a th:replace="~{admin/fragments/shell :: skipLink}"></a>
<div class="admin-shell">
<div th:replace="~{admin/fragments/shell :: sidebar('a-collections')}"></div>
<main class="admin-main">
	<div th:replace="~{admin/fragments/shell :: topbar}"></div>
	<div th:replace="~{admin/fragments/shell :: contentStart}"></div>
	<header class="admin-page-head">
		<div>
			<h1>데이터 수집</h1>
			<p>도시철도 마스터 수집을 실행하고 성공·실패·재시도 가능 여부를 확인합니다.</p>
		</div>
	</header>

	<form class="run-form" th:action="@{/admin/data-collections/page/run}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
		<input type="hidden" name="commandToken" th:value="${commandTokens.next()}">
		<label th:each="sourceOption : ${sourceOptions}">
			<input type="radio"
			       name="source"
			       th:value="${sourceOption.value}"
			       th:checked="${sourceOptionStat.first}">
			<span th:text="${sourceOption.label + ' 데이터 수집'}">도시철도 마스터 데이터 수집</span>
		</label>
		<button type="submit">수집 실행</button>
	</form>

	<section>
		<h2>최근 실행 기록</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">수집 대상</th>
				<th scope="col">상태</th>
				<th scope="col">요청자</th>
				<th scope="col">시작</th>
				<th scope="col">완료</th>
				<th scope="col">수집 건수</th>
				<th scope="col">단계</th>
				<th scope="col">실패 사유</th>
				<th scope="col">재시도</th>
				<th scope="col">다음 행동</th>
			</tr>
			</thead>
			<tbody>
			<tr th:if="${runs.isEmpty()}">
				<td class="empty" colspan="10">최근 실행 기록이 없습니다.</td>
			</tr>
			<tr th:each="run : ${runs}">
				<td th:text="${run.sourceLabel}">도시철도 마스터</td>
				<td th:text="${run.statusLabel}">완료</td>
				<td th:text="${run.requestedBy}">admin-user</td>
				<td th:text="${run.startedAt}">2026-06-15T10:00:00</td>
				<td th:text="${run.completedAtLabel()}">2026-06-15T10:01:00</td>
				<td th:text="${run.collectedCount}">13</td>
				<td>
					<ul>
						<li th:each="step : ${run.steps}">
							<strong th:text="${step.name}">FETCH</strong>
							<span th:text="${step.statusLabel}">완료</span>
							<span th:text="${'건수 ' + step.recordCount}">건수 14</span>
							<span th:text="${step.failureMessage}">-</span>
						</li>
					</ul>
				</td>
				<td th:text="${run.failureLabel()}">-</td>
				<td th:text="${run.retryableLabel()}">불필요</td>
				<td th:text="${run.operatorAction}">수집이 완료되었습니다. 최근 데이터 품질 화면에서 반영 결과를 확인하세요.</td>
			</tr>
			</tbody>
		</table>
		<div th:replace="~{admin/fragments/pagination :: pager('데이터 수집 실행 목록 페이지', ${page}, ${paginationLinks})}"></div>
	</section>
</main>
</div>
</body>
</html>
