<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>운영기관 알림 발송 현황</title>
	<style>
		body {
			margin: 0;
			background: #f5f7f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 1120px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 32px;
			line-height: 1.2;
		}

		p {
			margin: 0 0 24px;
			color: #40585a;
			font-size: 17px;
			line-height: 1.55;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #e8f1ef;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric {
			background: #fff;
			border: 1px solid #d6e0df;
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		section {
			margin-top: 24px;
			background: #fff;
			border: 1px solid #d6e0df;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d6e0df;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:nth-child(3),
		th:nth-child(3) {
			text-align: right;
			font-weight: 800;
		}

		.notice {
			padding: 18px;
			border-top: 1px solid #d6e0df;
			font-size: 16px;
			line-height: 1.55;
		}
	</style>
</head>
<body>
<main>
	<h1>운영기관 알림 발송 현황</h1>
	<p>운영기관 담당자가 사용자 알림 발송 규모와 실패 여부를 확인하는 읽기 전용 리포트입니다.</p>

	<div class="metric-grid" aria-label="알림 발송 현황 요약">
		<div class="metric">
			<span>전체 알림</span>
			<strong th:text="${report.totalCount}">0</strong>
		</div>
		<div class="metric">
			<span>대기 중</span>
			<strong th:text="${report.pendingCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 완료</span>
			<strong th:text="${report.sentCount}">0</strong>
		</div>
		<div class="metric">
			<span>발송 실패</span>
			<strong th:text="${report.failedCount}">0</strong>
		</div>
	</div>

	<section>
		<h2>상태별 발송 현황</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">상태</th>
				<th scope="col">설명</th>
				<th scope="col">건수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${report.statusRows}">
				<td th:text="${row.label}">대기 중</td>
				<td th:text="${row.description}">아직 발송 처리 전</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>

	<section>
		<h2>최근 실패 안내</h2>
		<div class="notice" th:if="${report.latestFailureReason != null}" th:text="${report.latestFailureReason}">
			푸시 발송 처리 중 오류가 발생했습니다. 관리자 점검이 필요합니다.
		</div>
		<div class="notice" th:if="${report.latestFailureReason == null}">
			최근 실패 없음
		</div>
	</section>
</main>
</body>
</html>
