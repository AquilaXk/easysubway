<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>운영기관 이동 불편 신고 분석</title>
	<style>
		body {
			margin: 0;
			background: #f5f7f8;
			color: #102a2c;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 32px 24px 48px;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 32px;
			line-height: 1.2;
		}

		p {
			margin: 0 0 24px;
			color: #40585a;
			font-size: 17px;
			line-height: 1.55;
		}

		h2 {
			margin: 0;
			padding: 16px 18px;
			background: #e8f1ef;
			font-size: 20px;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 12px;
			margin-bottom: 24px;
		}

		.metric {
			background: #fff;
			border: 1px solid #d6e0df;
			padding: 18px;
		}

		.metric span {
			display: block;
			color: #536b6d;
			font-weight: 800;
			line-height: 1.4;
		}

		.metric strong {
			display: block;
			margin-top: 8px;
			font-size: 30px;
			line-height: 1.15;
		}

		section {
			background: #fff;
			border: 1px solid #d6e0df;
		}

		section + section {
			margin-top: 24px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		th,
		td {
			padding: 14px 18px;
			border-top: 1px solid #d6e0df;
			text-align: left;
			vertical-align: top;
			font-size: 15px;
			line-height: 1.45;
		}

		th {
			background: #f8fbfb;
			font-weight: 800;
		}

		td:last-child,
		th:last-child {
			text-align: right;
			font-weight: 800;
		}
	</style>
</head>
<body>
<main>
	<h1>운영기관 이동 불편 신고 분석</h1>
	<p>운영기관 담당자가 경로 안내 만족도와 현장 차단 신고 흐름을 확인하는 읽기 전용 리포트입니다.</p>

	<div class="metric-grid" aria-label="이동 불편 신고 분석 요약">
		<div class="metric">
			<span>전체 피드백</span>
			<strong th:text="${summary.totalCount}">0</strong>
		</div>
		<div class="metric">
			<span>도움이 됨</span>
			<strong th:text="${summary.helpfulCount}">0</strong>
		</div>
		<div class="metric">
			<span>도움이 안 됨</span>
			<strong th:text="${summary.notHelpfulCount}">0</strong>
		</div>
		<div class="metric">
			<span>현장 차단</span>
			<strong th:text="${summary.blockedByRealWorldCount}">0</strong>
		</div>
	</div>

	<section>
		<h2>평점별 피드백</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">평점</th>
				<th scope="col">설명</th>
				<th scope="col">건수</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.ratingRows}">
				<td th:text="${row.label}">도움이 됨</td>
				<td th:text="${row.description}">경로 안내가 실제 이동에 도움됨</td>
				<td th:text="${row.count}">0</td>
			</tr>
			</tbody>
		</table>
	</section>

	<section>
		<h2>최근 현장 차단 신고</h2>
		<table>
			<thead>
			<tr>
				<th scope="col">신고 시각</th>
				<th scope="col">출발역</th>
				<th scope="col">도착역</th>
				<th scope="col">이동 프로필</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="row : ${summary.recentBlockedFeedbacks}">
				<td th:text="${row.createdAtLabel}">2026-06-17 10:00</td>
				<td th:text="${row.originStationName}">상록수</td>
				<td th:text="${row.destinationStationName}">사당</td>
				<td th:text="${row.mobilityTypeLabel}">고령자</td>
			</tr>
			<tr th:if="${#lists.isEmpty(summary.recentBlockedFeedbacks)}">
				<td colspan="4">최근 현장 차단 신고가 없습니다.</td>
			</tr>
			</tbody>
		</table>
	</section>
</main>
</body>
</html>
