logging:
  level:
    com.easysubway: INFO

management:
  endpoint:
    health:
      group:
        readiness:
          include: "readinessState,db,productionReadiness"

spring:
  datasource:
    url: ${EASYSUBWAY_DATASOURCE_URL}
    username: ${EASYSUBWAY_DATASOURCE_USERNAME}
    password: ${EASYSUBWAY_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    # 기존 운영 DB는 schema만 있고 Flyway 이력이 없을 수 있어 최초 전환 시 baseline으로 수렴시킨다.
    baseline-on-migrate: true
    baseline-version: 1
  batch:
    jdbc:
      # Batch metadata table은 Flyway baseline migration에서 운영 schema와 함께 관리한다.
      initialize-schema: never

easysubway:
  report:
    receipt-token-pepper: ${EASYSUBWAY_REPORT_RECEIPT_PEPPER:${EASYSUBWAY_REPORT_RECEIPT_TOKEN_PEPPER:}}
    abuse-control:
      window-seconds: ${EASYSUBWAY_REPORT_ABUSE_WINDOW_SECONDS:60}
      upload-intent-limit: ${EASYSUBWAY_REPORT_ABUSE_UPLOAD_INTENT_LIMIT:60}
      upload-claim-limit: ${EASYSUBWAY_REPORT_ABUSE_UPLOAD_CLAIM_LIMIT:120}
      report-submit-limit: ${EASYSUBWAY_REPORT_ABUSE_REPORT_SUBMIT_LIMIT:30}
      status-limit: ${EASYSUBWAY_REPORT_ABUSE_STATUS_LIMIT:120}
      confirm-limit: ${EASYSUBWAY_REPORT_ABUSE_CONFIRM_LIMIT:30}
      max-counter-keys: ${EASYSUBWAY_REPORT_ABUSE_MAX_COUNTER_KEYS:4096}
      store-mode: ${EASYSUBWAY_REPORT_ABUSE_STORE_MODE:local}
    upload:
      bucket: ${EASYSUBWAY_REPORT_UPLOAD_BUCKET:}
      max-bytes: ${EASYSUBWAY_REPORT_UPLOAD_MAX_BYTES:921600}
      url-ttl-seconds: ${EASYSUBWAY_REPORT_UPLOAD_URL_TTL_SECONDS:900}
      intent-signing-key: ${EASYSUBWAY_REPORT_UPLOAD_INTENT_SIGNING_KEY:${EASYSUBWAY_REPORT_RECEIPT_PEPPER:${EASYSUBWAY_REPORT_RECEIPT_TOKEN_PEPPER:}}}
      object-storage-endpoint: ${EASYSUBWAY_REPORT_OBJECT_STORAGE_INTERNAL_ENDPOINT:}
      public-base-url: ${EASYSUBWAY_REPORT_UPLOAD_PUBLIC_BASE_URL:}
      object-storage-access-key: ${EASYSUBWAY_OBJECT_STORAGE_ACCESS_KEY:}
      object-storage-secret-key: ${EASYSUBWAY_OBJECT_STORAGE_SECRET_KEY:}
      object-storage-region: ${EASYSUBWAY_OBJECT_STORAGE_REGION:us-east-1}
  admin:
    username: ${EASYSUBWAY_ADMIN_USERNAME}
    password: ${EASYSUBWAY_ADMIN_PASSWORD}
    basic-auth:
      enabled: ${EASYSUBWAY_ADMIN_BASIC_AUTH_ENABLED:false}
      exception-owner: ${EASYSUBWAY_ADMIN_BASIC_AUTH_EXCEPTION_OWNER:}
      exception-expires-at: ${EASYSUBWAY_ADMIN_BASIC_AUTH_EXCEPTION_EXPIRES_AT:}
  auth:
    client-ip:
      trusted-proxies: ${EASYSUBWAY_TRUSTED_PROXY_CIDRS}
  notifications:
    push:
      external-enabled: ${EASYSUBWAY_PUSH_EXTERNAL_ENABLED:false}
