logging:
  level:
    com.easysubway: INFO

spring:
  sql:
    init:
      # 운영 배포 초기화 단계에서 Batch 메타데이터 테이블을 멱등하게 준비한다.
      mode: always
      schema-locations: classpath:db/batch/schema-postgresql.sql
  batch:
    jdbc:
      # Boot 기본 Batch 스크립트는 반복 실행에 취약하므로 운영은 별도 멱등 스크립트로 관리한다.
      initialize-schema: never
