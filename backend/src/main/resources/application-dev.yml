logging:
  level:
    com.easysubway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
spring:
  datasource:
    url: jdbc:h2:mem:easysubway-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
easysubway:
  auth:
    client-ip:
      trusted-proxies: ${EASYSUBWAY_TRUSTED_PROXY_CIDRS:}
